version: '3.9'

# Production override — use with:
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

networks:
  payment-net:
    driver: bridge

services:

  postgres:
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: []   # Don't expose DB port in production

  redis:
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --save 60 1
        --loglevel warning
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
    ports: []   # Don't expose Redis port in production

  app:
    environment:
      NODE_ENV: production
      LOG_LEVEL: warn
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    # In production, run behind nginx reverse proxy
    ports:
      - '3000:3000'

  worker:
    environment:
      NODE_ENV: production
      LOG_LEVEL: warn
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: payment_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - payment-net
