version: "3.9"

# Local payment compose.
# Uses shared easydev core infrastructure from the main easydev stack:
# - PostgreSQL: core:5432
# - Redis: redis:6379

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: payment_app
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@core:5432/postgres?schema=payment
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: development
      PORT: 4000
    ports:
      - "4000:4000"
    networks:
      - payment-net
      - easydev-net
    command: >
      sh -c "npx prisma migrate deploy && node dist/main"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: payment_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@core:5432/postgres?schema=payment
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: development
    networks:
      - payment-net
      - easydev-net
    command: node dist/worker

networks:
  payment-net:
    driver: bridge
  easydev-net:
    external: true
