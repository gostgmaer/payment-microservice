version: '3.9'

# ─── Networks ──────────────────────────────────────────────────────────────
networks:
  payment-net:
    driver: bridge

# ─── Volumes ───────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:

# ─── Services ──────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: payment_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: payment_user
      POSTGRES_PASSWORD: payment_pass
      POSTGRES_DB: payment_db
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    networks:
      - payment-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U payment_user -d payment_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: payment_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    networks:
      - payment-net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  # ── NestJS App ────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: payment_app
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://payment_user:payment_pass@postgres:5432/payment_db?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: development
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - payment-net
    # Run Prisma migrations on container start, then launch app
    command: >
      sh -c "npx prisma migrate deploy && node dist/main"

  # ── BullMQ Worker (horizontally scalable, separate process) ───────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: payment_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://payment_user:payment_pass@postgres:5432/payment_db?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - payment-net
    command: node dist/worker
