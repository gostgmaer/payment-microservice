name: Payment Service Pipeline

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

permissions:
  contents: write

env:
  NEW_IMAGE: easydev-payment-service:latest
  IMAGE_ARCHIVE: easydev-payment-service-latest.tar.gz

jobs:
  code-quality:
    name: code-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm run prisma:generate

      - name: Lint
        run: pnpm run lint:check

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm exec jest --passWithNoTests

      - name: Build
        run: pnpm run build

  vulnerability:
    name: vulnerability
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency vulnerability scan
        run: pnpm audit --prod --audit-level critical

      - name: Trivy filesystem scan (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          vuln-type: library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: '1'

  build:
    name: build
    runs-on: ubuntu-latest
    needs: vulnerability
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: false
          load: true
          tags: ${{ env.NEW_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.NEW_IMAGE }}
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: '1'

      - name: Archive Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker save "${NEW_IMAGE}" | gzip > "${IMAGE_ARCHIVE}"

      - name: Upload image archive
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: payment-image-archive
          path: ${{ env.IMAGE_ARCHIVE }}
          if-no-files-found: error
          retention-days: 1

  deploy:
    name: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Download image archive
        uses: actions/download-artifact@v4
        with:
          name: payment-image-archive
          path: .

      - name: Copy image archive to Oracle VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: ${{ env.IMAGE_ARCHIVE }}
          target: /tmp/

      - name: Deploy on Oracle VM
        uses: appleboy/ssh-action@v1.0.3
        env:
          NEW_IMAGE: ${{ env.NEW_IMAGE }}
          IMAGE_ARCHIVE: ${{ env.IMAGE_ARCHIVE }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: NEW_IMAGE,IMAGE_ARCHIVE
          script: |
            set -euo pipefail

            DEPLOY_DIR="/home/opc/easydev-backends/deploy/oracle-vm"
            CORE_ENV="${DEPLOY_DIR}/.env.core"
            APPS_ENV="${DEPLOY_DIR}/.env.apps"
            ARCHIVE_PATH="/tmp/${IMAGE_ARCHIVE}"

            ensure_key() {
              local file="$1"
              local key="$2"
              local value="$3"
              if grep -q "^${key}=" "$file"; then
                return 0
              else
                printf '%s=%s\n' "$key" "$value" >> "$file"
              fi
            }

            set_with_backup() {
              local file="$1"
              local key="$2"
              local backup_key="$3"
              local new_value="$4"
              local old_value

              old_value="$(grep "^${key}=" "$file" | tail -n 1 | cut -d= -f2- || true)"
              if [[ -n "$old_value" && "$old_value" != "$new_value" ]]; then
                if grep -q "^${backup_key}=" "$file"; then
                  sed -i "s|^${backup_key}=.*|${backup_key}=${old_value}|" "$file"
                else
                  printf '%s=%s\n' "$backup_key" "$old_value" >> "$file"
                fi
              fi

              if grep -q "^${key}=" "$file"; then
                sed -i "s|^${key}=.*|${key}=${new_value}|" "$file"
              else
                printf '%s=%s\n' "$key" "$new_value" >> "$file"
              fi
            }

            wait_for_health() {
              local container_name="$1"
              local retries="${2:-50}"
              local sleep_seconds="${3:-5}"
              local state

              for ((i=1; i<=retries; i++)); do
                state="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_name" 2>/dev/null || true)"
                if [[ "$state" == "healthy" || "$state" == "running" ]]; then
                  echo "Healthy: $container_name ($state)"
                  return 0
                fi
                sleep "$sleep_seconds"
              done

              echo "Container did not become healthy in time: $container_name"
              docker logs --tail 120 "$container_name" || true
              return 1
            }

            if [[ ! -f "$ARCHIVE_PATH" ]]; then
              echo "Missing image archive: $ARCHIVE_PATH"
              exit 1
            fi

            if [[ ! -f "$CORE_ENV" ]]; then
              echo "Missing core env file: $CORE_ENV"
              exit 1
            fi

            if [[ ! -f "$APPS_ENV" ]]; then
              echo "Missing apps env file: $APPS_ENV"
              exit 1
            fi

            docker load -i "$ARCHIVE_PATH" >/dev/null
            rm -f "$ARCHIVE_PATH"

            ensure_key "$CORE_ENV" "PAYMENT_IMAGE" "easydev-payment-service:latest"
            ensure_key "$CORE_ENV" "PAYMENT_IMAGE_BACKUP" ""

            set_with_backup "$CORE_ENV" "PAYMENT_IMAGE" "PAYMENT_IMAGE_BACKUP" "$NEW_IMAGE"

            cd "$DEPLOY_DIR"
            docker compose --env-file .env.core -f compose.core.yml run --rm --no-deps payment-service sh -lc '
              if [ -x ./node_modules/.bin/prisma ]; then
                ./node_modules/.bin/prisma db push
              else
                npx prisma db push
              fi
            '
            docker compose --env-file .env.core -f compose.core.yml up -d --no-deps payment-service
            wait_for_health easydev-payment-service

            docker rm -f payment-postgres payment-redis >/dev/null 2>&1 || true
            docker network rm payment-only_payment-net >/dev/null 2>&1 || true

            PAYMENT_PUBLIC_HOST="$(grep '^PAYMENT_PUBLIC_HOST=' "$APPS_ENV" | tail -n 1 | cut -d= -f2- || true)"
            PAYMENT_PUBLIC_HOST="${PAYMENT_PUBLIC_HOST:-payment.easydev.in}"
            if ! curl --fail --max-time 20 --silent --show-error "https://${PAYMENT_PUBLIC_HOST}/api/v1/health" >/dev/null; then
              echo "Warning: public payment health check failed at https://${PAYMENT_PUBLIC_HOST}/api/v1/health"
            fi

            echo "Payment deployed in shared oracle-vm stack successfully."

  cleanup:
    name: cleanup
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: deploy
    environment: production
    steps:
      - name: Cleanup old payment images on Oracle VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail

            DEPLOY_DIR="/home/opc/easydev-backends/deploy/oracle-vm"
            DEPLOY_ENV="${DEPLOY_DIR}/.env.core"
            CONTAINER="easydev-payment-service"
            BACKUP_REF="$(grep '^PAYMENT_IMAGE_BACKUP=' "$DEPLOY_ENV" 2>/dev/null | tail -n 1 | cut -d= -f2- || true)"

            cleanup_repo_keep_current_and_backup() {
              local container_name="$1"
              local backup_ref="$2"
              local current_ref current_repo current_id backup_id

              current_ref="$(docker inspect --format '{{.Config.Image}}' "$container_name")"
              current_repo="${current_ref%:*}"
              current_id="$(docker inspect --format '{{.Image}}' "$container_name")"
              backup_id="$(docker image inspect --format '{{.Id}}' "$backup_ref" 2>/dev/null || true)"

              while IFS=' ' read -r image_ref image_id; do
                [[ -z "$image_ref" || -z "$image_id" ]] && continue
                if [[ "$image_id" == "$current_id" ]]; then
                  continue
                fi
                if [[ -n "$backup_id" && "$image_id" == "$backup_id" ]]; then
                  continue
                fi
                docker rmi "$image_ref" >/dev/null 2>&1 || true
              done < <(docker images "$current_repo" --format '{{.Repository}}:{{.Tag}} {{.ID}}' | sort -u)
            }

            if docker inspect "$CONTAINER" >/dev/null 2>&1; then
              cleanup_repo_keep_current_and_backup "$CONTAINER" "$BACKUP_REF"
            fi

            docker image prune -f >/dev/null 2>&1 || true

  tag:
    name: tag
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: cleanup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get next tag
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          LAST_TAG="$(git tag --list 'v*' --sort=-v:refname | head -n 1)"
          if [[ "$LAST_TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
          else
            MAJOR=0
            MINOR=0
            PATCH=0
          fi

          NEXT_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "NEW_TAG=$NEXT_TAG" >> "$GITHUB_ENV"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NEW_TAG }}
          name: Release ${{ env.NEW_TAG }}
          generate_release_notes: true
