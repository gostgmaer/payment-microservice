name: Payment Service Pipeline

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

permissions:
  contents: write

env:
  NEW_IMAGE: easydev-payment-service:latest
  IMAGE_ARCHIVE: easydev-payment-service-${{ github.sha }}.tar.gz
  PAYMENT_DEPLOY_DIR: /home/opc/payment-only

jobs:
  code-quality:
    name: code-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm run prisma:generate

      - name: Lint
        run: pnpm run lint:check

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm exec jest --passWithNoTests

      - name: Build
        run: pnpm run build

  vulnerability:
    name: vulnerability
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency vulnerability scan
        run: pnpm audit --prod --audit-level critical

      - name: Trivy filesystem scan (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          vuln-type: library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: '1'

  build:
    name: build
    runs-on: ubuntu-latest
    needs: vulnerability
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: false
          load: true
          tags: ${{ env.NEW_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.NEW_IMAGE }}
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: '1'

      - name: Archive Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker save "${NEW_IMAGE}" | gzip > "${IMAGE_ARCHIVE}"

      - name: Upload image archive
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: payment-image-archive
          path: ${{ env.IMAGE_ARCHIVE }}
          if-no-files-found: error
          retention-days: 1

  deploy:
    name: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select env source file
        id: env_source
        shell: bash
        run: |
          set -euo pipefail

          if [[ -f .env ]]; then
            SOURCE_ENV_FILE=".env"
          elif [[ -f .env.production ]]; then
            SOURCE_ENV_FILE=".env.production"
          elif [[ -f .env.example ]]; then
            SOURCE_ENV_FILE=".env.example"
          else
            echo "No env source file found. Expected one of: .env, .env.production, .env.example"
            exit 1
          fi

          echo "source_env_file=$SOURCE_ENV_FILE" >> "$GITHUB_OUTPUT"

      - name: Download image archive
        uses: actions/download-artifact@v4
        with:
          name: payment-image-archive
          path: .

      - name: Copy image archive to Oracle VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: ${{ env.IMAGE_ARCHIVE }}
          target: /tmp/payment-deploy/

      - name: Copy standalone compose file to Oracle VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: deploy/standalone/docker-compose.yml
          target: /tmp/payment-deploy/

      - name: Copy payment env source file to Oracle VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: ${{ steps.env_source.outputs.source_env_file }}
          target: /tmp/payment-deploy/

      - name: Deploy on Oracle VM
        uses: appleboy/ssh-action@v1.0.3
        env:
          NEW_IMAGE: ${{ env.NEW_IMAGE }}
          IMAGE_ARCHIVE: ${{ env.IMAGE_ARCHIVE }}
          PAYMENT_DEPLOY_DIR: ${{ env.PAYMENT_DEPLOY_DIR }}
          SOURCE_ENV_FILE: ${{ steps.env_source.outputs.source_env_file }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: NEW_IMAGE,IMAGE_ARCHIVE,PAYMENT_DEPLOY_DIR,SOURCE_ENV_FILE
          script: |
            set -euo pipefail

            TMP_DIR="/tmp/payment-deploy"
            ARCHIVE_PATH="${TMP_DIR}/${IMAGE_ARCHIVE}"
            DEPLOY_DIR="${PAYMENT_DEPLOY_DIR}"
            DEPLOY_ENV="${DEPLOY_DIR}/.env"
            PREVIOUS_DEPLOY_ENV="${DEPLOY_DIR}/.env.previous"
            DEPLOY_COMPOSE="${DEPLOY_DIR}/docker-compose.yml"
            SOURCE_ENV_BASENAME="$(basename "${SOURCE_ENV_FILE}")"
            SOURCE_ENV_PATH="${TMP_DIR}/${SOURCE_ENV_BASENAME}"
            SOURCE_COMPOSE_PATH="${TMP_DIR}/deploy/standalone/docker-compose.yml"
            CORE_DIR="/home/opc/easydev-backends/deploy/oracle-vm"

            if [[ ! -f "$SOURCE_COMPOSE_PATH" && -f "${TMP_DIR}/docker-compose.yml" ]]; then
              SOURCE_COMPOSE_PATH="${TMP_DIR}/docker-compose.yml"
            fi

            pick_first_free_port() {
              local p
              for p in $(seq 3200 3210); do
                if ! ss -ltnH | grep -q ":${p} "; then
                  echo "$p"
                  return 0
                fi
              done
              return 1
            }

            get_key() {
              local file="$1"
              local key="$2"
              grep "^${key}=" "$file" | tail -n 1 | cut -d= -f2- || true
            }

            get_container_key() {
              local container_name="$1"
              local key="$2"
              docker inspect --format '{{range .Config.Env}}{{println .}}{{end}}' "$container_name" 2>/dev/null | grep "^${key}=" | tail -n 1 | cut -d= -f2- || true
            }

            ensure_non_empty_keys() {
              local file="$1"
              shift
              local key value missing=()
              for key in "$@"; do
                value="$(get_key "$file" "$key")"
                if [[ -z "$value" ]]; then
                  missing+=("$key")
                fi
              done
              if [[ ${#missing[@]} -gt 0 ]]; then
                echo "Missing required env keys: ${missing[*]}"
                return 1
              fi
            }

            set_key() {
              local file="$1"
              local key="$2"
              local value="$3"
              local escaped

              escaped="$(printf '%s' "$value" | sed -e 's/[\\&|]/\\\\&/g')"

              if grep -q "^${key}=" "$file"; then
                sed -i "s|^${key}=.*|${key}=${escaped}|" "$file"
              else
                printf '%s=%s\n' "$key" "$value" >> "$file"
              fi
            }

            restore_key_if_missing() {
              local key="$1"
              local current_value previous_value

              current_value="$(get_key "$DEPLOY_ENV" "$key")"
              if [[ -n "$current_value" ]]; then
                return 0
              fi

              previous_value="$(get_key "$PREVIOUS_DEPLOY_ENV" "$key")"
              if [[ -z "$previous_value" ]] && docker inspect easydev-payment-service >/dev/null 2>&1; then
                previous_value="$(get_container_key easydev-payment-service "$key")"
              fi

              if [[ -n "$previous_value" ]]; then
                set_key "$DEPLOY_ENV" "$key" "$previous_value"
              fi
            }

            wait_for_health() {
              local container_name="$1"
              local retries="${2:-50}"
              local sleep_seconds="${3:-5}"
              local state

              for ((i=1; i<=retries; i++)); do
                state="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_name" 2>/dev/null || true)"
                if [[ "$state" == "healthy" || "$state" == "running" ]]; then
                  echo "Healthy: $container_name ($state)"
                  return 0
                fi
                sleep "$sleep_seconds"
              done

              echo "Container did not become healthy in time: $container_name"
              docker logs --tail 120 "$container_name" || true
              return 1
            }

            wait_for_running() {
              local container_name="$1"
              local retries="${2:-40}"
              local sleep_seconds="${3:-3}"
              local state

              for ((i=1; i<=retries; i++)); do
                state="$(docker inspect --format '{{.State.Status}}' "$container_name" 2>/dev/null || true)"
                if [[ "$state" == "running" ]]; then
                  echo "Running: $container_name"
                  return 0
                fi
                sleep "$sleep_seconds"
              done

              echo "Container did not reach running state in time: $container_name"
              docker logs --tail 120 "$container_name" || true
              return 1
            }

            if [[ ! -f "$ARCHIVE_PATH" ]]; then
              echo "Missing image archive: $ARCHIVE_PATH"
              exit 1
            fi

            if [[ ! -f "$SOURCE_ENV_PATH" ]]; then
              echo "Missing env source file: $SOURCE_ENV_PATH"
              exit 1
            fi

            if [[ ! -f "$SOURCE_COMPOSE_PATH" ]]; then
              echo "Missing standalone compose file: $SOURCE_COMPOSE_PATH"
              exit 1
            fi

            mkdir -p "$DEPLOY_DIR"

            previous_image="$(get_key "$DEPLOY_ENV" "PAYMENT_IMAGE")"

            if [[ -f "$DEPLOY_ENV" ]]; then
              cp "$DEPLOY_ENV" "$PREVIOUS_DEPLOY_ENV"
            else
              : > "$PREVIOUS_DEPLOY_ENV"
            fi

            cp "$SOURCE_ENV_PATH" "$DEPLOY_ENV"
            cp "$SOURCE_COMPOSE_PATH" "$DEPLOY_COMPOSE"

            restore_key_if_missing JWT_SECRET
            restore_key_if_missing IAM_SERVICE_API_KEY
            restore_key_if_missing API_KEY_HASH
            restore_key_if_missing REDIS_PASSWORD
            restore_key_if_missing STRIPE_SECRET_KEY
            restore_key_if_missing STRIPE_WEBHOOK_SECRET
            restore_key_if_missing RAZORPAY_KEY_ID
            restore_key_if_missing RAZORPAY_KEY_SECRET
            restore_key_if_missing RAZORPAY_WEBHOOK_SECRET

            IAM_NETWORK_NAME="$(get_key "$DEPLOY_ENV" "IAM_DOCKER_NETWORK")"
            if [[ -z "$IAM_NETWORK_NAME" ]]; then
              IAM_NETWORK_NAME="iam-auth-only_iam-auth-net"
            fi

            if ! docker network inspect "$IAM_NETWORK_NAME" >/dev/null 2>&1; then
              echo "Required IAM Docker network not found: $IAM_NETWORK_NAME"
              exit 1
            fi

            if ! docker inspect iam-auth-service >/dev/null 2>&1; then
              echo "Required IAM container not found: iam-auth-service"
              exit 1
            fi

            set_key "$DEPLOY_ENV" "IAM_DOCKER_NETWORK" "$IAM_NETWORK_NAME"
            set_key "$DEPLOY_ENV" "IAM_SERVICE_URL" "http://iam-auth-service:3100"

            ensure_non_empty_keys "$DEPLOY_ENV" DATABASE_URL JWT_SECRET IAM_SERVICE_URL IAM_SERVICE_API_KEY

            if [[ "$(get_key "$DEPLOY_ENV" "STRIPE_ENABLED")" == "true" ]]; then
              ensure_non_empty_keys "$DEPLOY_ENV" STRIPE_SECRET_KEY
            fi

            if [[ "$(get_key "$DEPLOY_ENV" "RAZORPAY_ENABLED")" == "true" ]]; then
              ensure_non_empty_keys "$DEPLOY_ENV" RAZORPAY_KEY_ID RAZORPAY_KEY_SECRET
            fi

            SELECTED_PORT="$(pick_first_free_port || true)"
            if [[ -z "$SELECTED_PORT" ]]; then
              echo "No free host port in range 3200-3210"
              exit 1
            fi

            set_key "$DEPLOY_ENV" "PAYMENT_IMAGE" "$NEW_IMAGE"
            set_key "$DEPLOY_ENV" "PAYMENT_HOST_PORT" "$SELECTED_PORT"

            if [[ -n "$previous_image" && "$previous_image" != "$NEW_IMAGE" ]]; then
              set_key "$DEPLOY_ENV" "PAYMENT_IMAGE_BACKUP" "$previous_image"
            else
              set_key "$DEPLOY_ENV" "PAYMENT_IMAGE_BACKUP" ""
            fi

            docker load -i "$ARCHIVE_PATH" >/dev/null
            rm -f "$ARCHIVE_PATH"

            if [[ -f "${CORE_DIR}/compose.core.yml" && -f "${CORE_DIR}/.env.core" ]]; then
              cd "$CORE_DIR"
              docker compose --env-file .env.core -f compose.core.yml stop payment-service || true
              docker compose --env-file .env.core -f compose.core.yml rm -f payment-service || true
              docker compose --env-file .env.core -f compose.core.yml stop payment-worker || true
              docker compose --env-file .env.core -f compose.core.yml rm -f payment-worker || true
            fi

            cd "$DEPLOY_DIR"
            docker compose --env-file .env -f docker-compose.yml up -d payment-postgres payment-redis
            wait_for_health payment-postgres
            wait_for_health payment-redis

            docker compose --env-file .env -f docker-compose.yml run --rm --no-deps payment-service ./node_modules/.bin/prisma db push
            docker compose --env-file .env -f docker-compose.yml up -d payment-service payment-worker
            wait_for_health easydev-payment-service
            wait_for_running easydev-payment-worker

            rm -rf "$TMP_DIR"
            rm -f "$PREVIOUS_DEPLOY_ENV"

            echo "PAYMENT_SELECTED_PORT=${SELECTED_PORT}"
            echo "Standalone payment deployed without restarting unrelated services."

  cleanup:
    name: cleanup
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: deploy
    environment: production
    steps:
      - name: Cleanup old payment images on Oracle VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail

            DEPLOY_DIR="/home/opc/payment-only"
            DEPLOY_ENV="${DEPLOY_DIR}/.env"
            CONTAINER="easydev-payment-service"
            BACKUP_REF="$(grep '^PAYMENT_IMAGE_BACKUP=' "$DEPLOY_ENV" 2>/dev/null | tail -n 1 | cut -d= -f2- || true)"

            CURRENT_ID="$(docker inspect --format '{{.Image}}' "$CONTAINER" 2>/dev/null || true)"
            BACKUP_ID="$(docker image inspect --format '{{.Id}}' "$BACKUP_REF" 2>/dev/null || true)"

            cleanup_repo() {
              local repo="$1"
              while IFS=' ' read -r image_ref image_id; do
                [[ -z "$image_ref" || -z "$image_id" ]] && continue
                if [[ -n "$CURRENT_ID" && "$image_id" == "$CURRENT_ID" ]]; then
                  continue
                fi
                if [[ -n "$BACKUP_ID" && "$image_id" == "$BACKUP_ID" ]]; then
                  continue
                fi
                docker rmi "$image_ref" >/dev/null 2>&1 || true
              done < <(docker images "$repo" --format '{{.Repository}}:{{.Tag}} {{.ID}}' | sort -u)
            }

            cleanup_repo easydev-payment-service
            cleanup_repo easydev-core-payment-service

  tag:
    name: tag
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: cleanup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get next tag
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          LAST_TAG="$(git tag --list 'v*' --sort=-v:refname | head -n 1)"
          if [[ "$LAST_TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
          else
            MAJOR=0
            MINOR=0
            PATCH=0
          fi

          NEXT_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "NEW_TAG=$NEXT_TAG" >> "$GITHUB_ENV"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NEW_TAG }}
          name: Release ${{ env.NEW_TAG }}
          generate_release_notes: true
